<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SDD World</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: monospace; overflow: hidden; }
      /* Bike-E3.23: pulse for unseen HUD nav links */
      @keyframes sdd-pulse {
        0%, 100% { transform: scale(0.85); opacity: 0.55; }
        50% { transform: scale(1.15); opacity: 1; }
      }
      /* Bike-E3.29: damage / heal floaters in tactical combat */
      @keyframes sdd-floater {
        0%   { transform: translateY(0); opacity: 0; }
        15%  { opacity: 1; }
        100% { transform: translateY(-22px); opacity: 0; }
      }
      /* Bike-E7+: touch-friendly tap targets in modal dialogs.
         Inline styles in the components keep their colors / look; this
         layer just enforces a 44pt minimum hit area on touch devices. */
      @media (pointer: coarse) {
        button[data-testid$="-close"],
        button[data-testid$="-buy"],
        button[data-testid^="shop-buy-"],
        button[data-testid^="shop-sell-"],
        button[data-testid^="shop-tab-"],
        button[data-testid^="perk-buy-"],
        button[data-testid^="quest-claim-"],
        button[data-testid^="cook-"],
        button[data-testid^="equip-"]:not([data-testid^="equip-delta-"]):not([data-testid^="equip-slot-"]),
        button[data-testid^="unequip-"],
        button[data-testid^="uncurse-"] {
          min-height: 44px !important;
          min-width: 44px !important;
          padding: 10px 14px !important;
          touch-action: manipulation;
        }
        /* Close × buttons usually inline-styled at 28×28. Bump to 44×44. */
        button[data-testid$="-close"] {
          font-size: 20px !important;
        }
      }
    </style>
    <script type="module" crossorigin src="/sdd-world-build/assets/index-BpyGFb60.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
